<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"/>

        <!-- ko if: (showLogo())-->
        <label class="label" data-bind="attr: {'for': getCode()}">
            <img class="payment-icon" data-bind="attr: {'src': logoImage() , 'width': '100px' , 'alt': getTitle()}"/>
        </label>
        <!--/ko-->

        <!-- ko if: (showTitle())-->
		<label class="label" data-bind="attr: {'for': getCode()}">
		  	<span data-bind="text: getTitle()"></span>
		</label>
        <!--/ko-->
    </div>

    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>

        <form class="form" data-bind="attr: {'id': getCode() + '-form'}">
            <!--
			/**
			 * Copyright © Magento, Inc. All rights reserved.
			 * See COPYING.txt for license details.
			 */
			-->
			<!-- ko if: window.checkoutConfig.payment.valorpay.enableAch -->
			<div>
				<div class="field choice">
					<input type="radio" name="payment_method" id="payment_card" value="card" class="radio"/>
					<label for="payment_card" data-bind="i18n: 'Credit Card'"></label>
					<div class="payment-details" id="card_details" style="display:none;">
						<fieldset data-bind="attr: {class: 'fieldset payment items ccard ' + getCode(), id: 'payment_form_' + getCode()}">
							<!-- ko if: (isShowLegend())-->
							<legend class="legend">
								<span><!-- ko i18n: 'Credit Card Information'--><!-- /ko --></span>
							</legend><br />
							<!-- /ko -->

							<!-- ko if: (showCards() && canSaveCard())-->
							<div class="field card_list">
								<label data-bind="attr: {for: getCode() + '_card_id'}" class="label">
									<span><!-- ko text: $t('Payment Informations')--><!-- /ko --></span>
								</label>
								<div class="control" style="position: relative;">
									<select name="payment[cc_id]" class="select input-text required-entry"
										data-bind="
											attr: {id: getCode()+'_cc_id'},
											options: getCardList(),
											optionsValue: 'value',
											optionsText: 'type',
											optionsCaption: $t('--Please Select--'),
											event:{ change: addNewCard()}
											" style="padding-left:60px">
									</select>
									<div id="card_logo" style="position:absolute;top:4px;left:4px"></div>
								</div>
							</div>
							<!-- /ko -->

							<div class="field type hide-if-cards-available">
								<div class="control">
									<ul class="credit-card-types">
										<!-- ko foreach: {data: getCcAvailableTypesValues(), as: 'item'} -->
										<li class="item" data-bind="css: {
																		_active: $parent.selectedCardType() == item.value,
																		_inactive: $parent.selectedCardType() != null && $parent.selectedCardType() != item.value
																		} ">
											<!--ko if: $parent.getIcons(item.value) -->
											<img data-bind="attr: {
												'src': $parent.getIcons(item.value).url,
												'alt': item.type,
												'width': $parent.getIcons(item.value).width,
												'height': $parent.getIcons(item.value).height
												}">
											<!--/ko-->
										</li>
										<!--/ko-->
									</ul>
									<input type="hidden"
										name="payment[cc_type]"
										class="input-text"
										value=""
										data-bind="attr: {id: getCode() + '_cc_type', 'data-container': getCode() + '-cc-type'},
										value: creditCardType
										">
								</div>
							</div>

							<div class="field number required hide-if-cards-available">
								<label data-bind="attr: {for: getCode() + '_cc_number'}" class="label">
									<span><!-- ko i18n: 'Credit Card Number'--><!-- /ko --></span>
								</label>
								<div class="control">
									<input type="number" name="payment[cc_number]" class="input-text cc_number" onKeyDown="if(this.value.length==19 && event.keyCode!=8) return false;" value=""
										oncopy="return false;"
										oncut="return false;"
										onpaste="return false;"
										data-bind="attr: {
															autocomplete: off,
															id: getCode() + '_cc_number',
															title: $t('Credit Card Number'),
															'data-container': getCode() + '-cc-number',
															'data-validate': JSON.stringify({'required-number':true, 'validate-card-type':getCcAvailableTypesValues(), 'validate-card-number':'#' + getCode() + '_cc_type', 'validate-cc-type':'#' + getCode() + '_cc_type'})},
													enable: isActive($parents),
													value: creditCardNumber,
													valueUpdate: 'keyup'"/>
								</div>
							</div>

							<div class="field date required hide-if-cards-available" data-bind="attr: {id: getCode() + '_cc_type_exp_div'}">
								<label data-bind="attr: {for: getCode() + '_expiration'}" class="label">
									<span><!-- ko i18n: 'Expiration Date'--><!-- /ko --></span>
								</label>
								<div class="control">
									<div class="fields group group-2">
										<div class="field no-label month">
											<div class="control">
												<select  name="payment[cc_exp_month]"
														class="select select-month"
														data-bind="attr: {id: getCode() + '_expiration', 'data-container': getCode() + '-cc-month', 'data-validate': JSON.stringify({required:true, 'validate-cc-exp':'#' + getCode() + '_expiration_yr'})},
																	enable: isActive($parents),
																	options: getCcMonthsValues(),
																	optionsValue: 'value',
																	optionsText: 'month',
																	optionsCaption: $t('Month'),
																	value: creditCardExpMonth">
												</select>
											</div>
										</div>
										<div class="field no-label year">
											<div class="control">
												<select name="payment[cc_exp_year]"
														class="select select-year"
														data-bind="attr: {id: getCode() + '_expiration_yr', 'data-container': getCode() + '-cc-year', 'data-validate': JSON.stringify({required:true})},
																enable: isActive($parents),
																options: getCcYearsValues(),
																optionsValue: 'value',
																optionsText: 'year',
																optionsCaption: $t('Year'),
																value: creditCardExpYear">
												</select>
											</div>
										</div>
									</div>
								</div>
							</div>
							<!-- ko if: (hasVerification())-->
							<div class="field cvv required hide-if-cards-available" data-bind="attr: {id: getCode() + '_cc_type_cvv_div'}">
								<label data-bind="attr: {for: getCode() + '_cc_cid'}" class="label">
									<span><!-- ko i18n: 'Card Verification Number'--><!-- /ko --></span>
								</label>
								<div class="control _with-tooltip">
									<input type="number"
										autocomplete="off"
										class="input-text cvv"
										name="payment[cc_cid]"
										onKeyDown="if(this.value.length==4 && event.keyCode!=8) return false;"
										value=""
										oncopy="return false;"
										oncut="return false;"
										onpaste="return false;"
										data-bind="attr: {id: getCode() + '_cc_cid',
												title: $t('Card Verification Number'),
												'data-container': getCode() + '-cc-cvv',
												'data-validate': JSON.stringify({'required-number':true, 'validate-card-cvv':'#' + getCode() + '_cc_type'})},
												enable: isActive($parents),
												value: creditCardVerificationNumber, valueUpdate: 'keyup'" />
									<div class="field-tooltip toggle">
										<span class="field-tooltip-action action-cvv"
											tabindex="0"
											data-toggle="dropdown"
											data-bind="attr: {title: $t('What is this?')}, mageInit: {'dropdown':{'activeClass': '_active'}}">
											<span><!-- ko i18n: 'What is this?'--><!-- /ko --></span>
										</span>
										<div class="field-tooltip-content"
											data-target="dropdown"
											data-bind="html: getCvvImageHtml()"></div>
									</div>
								</div>
							</div>
							<!-- /ko -->
							<div class="fields group group-2">
								<!-- ko if: (hasAVSZip())-->
								<div class="field required avs-zipcode" style="width:100px;float:left;margin-right:5px;">
									<label data-bind="attr: {for: getCode() + '_avs_zipcode'}" class="label">
										<span><!-- ko i18n: 'Zip Code'--><!-- /ko --></span>
									</label>
									<div class="control">
										<input type="text" name="payment[avs_zipcode]" class="input-text" value=""
														data-bind="value: getAvsZip(),attr: {id: getCode() + '_avs_zipcode', 'data-container': getCode() + '-avs-zipcode', 'data-validate': JSON.stringify({required:true})}" />
									</div>
								</div>
								<!-- /ko -->

								<!-- ko if: (hasAVSAddress())-->
								<div class="field required avs-address" style="width:200px;float:left;">
									<label data-bind="attr: {for: getCode() + '_avs_address'}" class="label">
										<span><!-- ko i18n: 'Address'--><!-- /ko --></span>
									</label>
									<div class="control">
										<input type="text" name="payment[avs_address]" class="input-text" value=""
														data-bind="value: getAvsAddress(),attr: {id: getCode() + '_avs_address', 'data-container': getCode() + '-avs-address', 'data-validate': JSON.stringify({required:true})}" />
									</div>
								</div>
								<!-- /ko -->
							</div>
							<!-- ko if: (canSaveCard() && showSaveCard())-->
							<div class="field hide-if-cards-available" style="clear:both;">
								<div class="control">
									<input type="checkbox"
										name="payment[save]"
										class="checkbox"
										data-bind="attr: {id: getCode() + '-save'}"/>
									<label class="label" data-bind="attr: {for: getCode() + '-save'}">
										<span><!-- ko text: $t('Save for next time')--><!-- /ko --></span>
									</label>
								</div>
							</div>
							<!-- /ko -->
							<div class="field" style="clear:both;">
								<div class="control"><input type="checkbox" name="payment[terms_checked]" class="checkbox"
										data-bind="attr: {id: getCode() + '_terms_checked'}, checked: true" /><label
										class="label" data-bind="attr: {for: getCode() + '_terms_checked'}">
										<span><!-- ko text: $t('I agree to the')--><!-- /ko --> <a href="https://valorpaytech.com/privacy-policy/" target="_blank"><!-- ko text: $t('Terms And Conditions')--><!-- /ko --></a></span></label>
								</div>
							</div>
						</fieldset>
					</div>
				</div>
				<!-- ACH (only if enabled in config) -->
				<!-- ko if: window.checkoutConfig.payment.valorpay.enableAch -->
				<div class="field choice">
					<input type="radio" name="payment_method" id="payment_ach" value="ach" class="radio"/>
					<label for="payment_ach" data-bind="i18n: 'ACH'"></label>

					<div class="payment-details" id="ach_details" style="display:none; width: 70%;">
                        <fieldset class="ach_payment_form_valorpay_gateway" id="ach_payment_form_valorpay_gateway">

							<div class="ach_field required">
								<label for="account" class="ach_label_req"><span>Account Number</span></label>
								<div class="ach_control">
									<input type="text"  id="account" name="payment[account]" placeholder="Account Number"
										class="input-text" maxlength="18" data-validate='{"required-entry":true,"validate-number":true}'/>
								</div>
							</div>

							<div class="ach_field required">
								<label for="routing" class="ach_label_req"><span>Routing Number</span></label>
								<div class="ach_control">
									<input type="text" id="routing" name="payment[routing]" placeholder="Routing Number"
									class="input-text" maxlength="9" data-validate='{"required-entry":true,"validate-number":true}'/>
								</div>
							</div>

							<div class="ach_field required">
								<label for="name_on_account" class="ach_label_req"><span>Name on Account</span></label>
								<div class="ach_control">
									<input type="text" id="name_on_account" name="payment[name_on_account]" placeholder="Name on Account"
										class="input-text" maxlength="30" data-validate='{"required-entry":true}'/>
								</div>
							</div>

							<div class="ach_field required">
								<label for="account_type" class="ach_label_req"><span>Account Type</span></label>
								<div class="ach_control">
									<select id="account_type" name="account_type"
											data-validate='{"required-entry":true}'>
										<option value="">Select account type</option>
										<option value="checking">Checking</option>
										<option value="savings">Savings</option>
									</select>
								</div>
							</div>

							<div class="ach_field required">
								<label for="entry_class" class="ach_label_req"><span>Entry Class</span></label>
								<div class="ach_control">
									<select id="entry_class" name="entry_class"
											data-validate='{"required-entry":true}'>
										<option value="">Select entry class</option>
										<option value="Business">Business</option>
										<option value="Personal">Personal</option>
									</select>
								</div>
							</div>

							<div class="ach_field required">
								<label for="phone_number" class="ach_label"><span>Phone Number</span></label>
								<div class="ach_control">
									<input type="text" id="phone_number" name="payment[phone_number]" placeholder="Phone Number"
										class="input-text" minlength="10" maxlength="10"  data-validate='{"validate-number":true, "validate-phone-or-email":"#email"}' />
								</div>
							</div>

							<div class="ach_field required">
								<label for="email" class="ach_label"><span>Email</span></label>
								<div class="ach_control">
									<input type="text" id="email" name="payment[email]" placeholder="Email"
										class="input-text" data-validate='{"validate-email":true,"validate-phone-or-email":"#phone_number"}'/>
								</div>
							</div>
						</fieldset>

                    </div>
				</div>
				<!-- /ko -->
			</div>
			<!--/ko-->
			<!-- ko ifnot: window.checkoutConfig.payment.valorpay.enableAch -->
			<div>
				<fieldset data-bind="attr: {class: 'fieldset payment items ccard ' + getCode(), id: 'payment_form_' + getCode()}">
